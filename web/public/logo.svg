<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
  </defs>

  <!-- Circle (guino al anarcocapitalismo) -->
  <circle cx="60" cy="60" r="55" stroke="currentColor" stroke-width="2.5" fill="none" opacity="0.3"/>

  <!-- Triangle (A = piramide) -->
  <polygon points="60,22 105,95 15,95" fill="currentColor" opacity="0.12" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>

  <!-- Horizontal cut line (barra de la H, divide las dos clases) -->
  <line x1="22" y1="62" x2="98" y2="62" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left H vertical (ligeramente inclinada hacia dentro) -->
  <line x1="30" y1="75" x2="25" y2="35" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right H vertical (ligeramente inclinada hacia dentro) -->
  <line x1="90" y1="75" x2="95" y2="35" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small notch at bottom of triangle representing the open bottom of an A encircled -->
  <line x1="55" y1="95" x2="65" y2="95" stroke="transparent" stroke-width="2"/>
</svg>
