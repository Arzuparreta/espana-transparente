<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>España Transparente — datos públicos de la política española</title>

  <defs>
    <linearGradient id="fade-panel-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0F0D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F0F0D" stop-opacity="1"/>
