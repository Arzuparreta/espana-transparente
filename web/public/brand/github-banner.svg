<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <title>España Transparente — datos públicos de la política española</title>

  <defs>
    <linearGradient id="fade-panel-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0F0D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F0F0D" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="#0B0B0A"/>

  <!-- Right data panel -->
  <rect x="820" y="0" width="460" height="320" fill="#0F0F0D"/>
  <rect x="820" y="0" width="1" height="320" fill="#2A2A27"/>

  <!-- Logo mark (pyramid): positioned left, vertically centered -->
  <g transform="translate(52, 100) scale(0.9)">
    <polygon points="14,22 86,22 80.71,30.82 19.29,30.82" fill="#EEEDE9"/>
    <polygon points="21.68,34.79 78.32,34.79 73.03,43.62 26.97,43.62" fill="#EEEDE9"/>
    <polygon points="29.35,47.59 70.65,47.59 65.35,56.41 34.65,56.41" fill="#EEEDE9"/>
    <polygon points="37.03,60.38 62.97,60.38 57.68,69.21 42.32,69.21" fill="#EEEDE9"/>
    <polygon points="44.71,73.18 55.29,73.18 50,82 50,82" fill="#C8FF00"/>
  </g>

  <!-- Eyebrow label -->
  <text x="148" y="115"
        fill="#999992"
        font-family="Noto Sans Mono, monospace"
        font-size="10"
        letter-spacing="2.5">PORTAL DE TRANSPARENCIA PÚBLICA · ESPAÑA</text>

  <!-- Main brand name -->
  <text x="146" y="183"
        fill="#EEEDE9"
        font-family="Open Sans Condensed ExtraBold, Open Sans, Liberation Sans, sans-serif"
        font-size="58"
        font-weight="800"
        letter-spacing="-1.5">España Transparente</text>

  <!-- Tagline -->
  <text x="148" y="214"
        fill="#999992"
        font-family="Noto Sans Mono, monospace"
        font-size="14"
        letter-spacing="3.5">EL ESTADO ESPAÑOL. SIN FILTROS.</text>

  <!-- Acid green accent line -->
  <rect x="148" y="234" width="390" height="2" fill="#C8FF00"/>

  <!-- Stats -->
  <text x="148" y="272"
        fill="#C8FF00"
        font-family="Noto Sans Mono, monospace"
        font-size="18">350</text>
  <text x="196" y="272"
        fill="#999992"
        font-family="Noto Sans Mono, monospace"
        font-size="11"
        letter-spacing="2">DIPUTADOS</text>

  <text x="340" y="272"
        fill="#EEEDE9"
        font-family="Noto Sans Mono, monospace"
        font-size="18">50K+</text>
  <text x="394" y="272"
        fill="#999992"
        font-family="Noto Sans Mono, monospace"
        font-size="11"
        letter-spacing="2">VOTACIONES</text>

  <text x="560" y="272"
        fill="#EEEDE9"
        font-family="Noto Sans Mono, monospace"
        font-size="18">14K+</text>
  <text x="608" y="272"
        fill="#999992"
        font-family="Noto Sans Mono, monospace"
        font-size="11"
        letter-spacing="2">CONTRATOS</text>

  <!-- Right panel: divergence data rows -->
  <text x="842" y="46"
        fill="#999992"
        font-family="Noto Sans Mono, monospace"
        font-size="10"
        letter-spacing="2.5">DIVERGENCIAS · CONGRESO</text>
  <rect x="842" y="56" width="400" height="1" fill="#2A2A27"/>

  <!-- Row 1 — highlighted -->
  <rect x="842" y="64" width="400" height="28" rx="2" fill="#C8FF00" fill-opacity="0.05"/>
  <rect x="842" y="64" width="2" height="28" fill="#C8FF00"/>
  <text x="852" y="82" fill="#EEEDE9" font-family="Noto Sans Mono, monospace" font-size="11">FERNÁNDEZ G., José</text>
  <text x="1186" y="82" fill="#C8FF00" font-family="Noto Sans Mono, monospace" font-size="11">▲ DIV</text>

  <!-- Row 2 -->
  <rect x="842" y="93" width="400" height="1" fill="#1D1D1A"/>
  <text x="848" y="111" fill="#6A6A63" font-family="Noto Sans Mono, monospace" font-size="11">MARTÍNEZ R., Ana</text>
  <text x="1214" y="111" fill="#6A6A63" font-family="Noto Sans Mono, monospace" font-size="11">—</text>

  <!-- Row 3 — highlighted -->
  <rect x="842" y="121" width="400" height="1" fill="#1D1D1A"/>
  <rect x="842" y="122" width="400" height="28" rx="2" fill="#C8FF00" fill-opacity="0.05"/>
  <rect x="842" y="122" width="2" height="28" fill="#C8FF00"/>
  <text x="852" y="140" fill="#EEEDE9" font-family="Noto Sans Mono, monospace" font-size="11">RODRÍGUEZ P., Carlos</text>
  <text x="1186" y="140" fill="#C8FF00" font-family="Noto Sans Mono, monospace" font-size="11">▲ DIV</text>

  <!-- Row 4 -->
  <rect x="842" y="151" width="400" height="1" fill="#1D1D1A"/>
  <text x="848" y="169" fill="#6A6A63" font-family="Noto Sans Mono, monospace" font-size="11">LÓPEZ S., María</text>
  <text x="1214" y="169" fill="#6A6A63" font-family="Noto Sans Mono, monospace" font-size="11">—</text>

  <!-- Row 5 — highlighted -->
  <rect x="842" y="179" width="400" height="1" fill="#1D1D1A"/>
  <rect x="842" y="180" width="400" height="28" rx="2" fill="#C8FF00" fill-opacity="0.05"/>
  <rect x="842" y="180" width="2" height="28" fill="#C8FF00"/>
  <text x="852" y="198" fill="#EEEDE9" font-family="Noto Sans Mono, monospace" font-size="11">GÓMEZ H., Luis</text>
  <text x="1186" y="198" fill="#C8FF00" font-family="Noto Sans Mono, monospace" font-size="11">▲ DIV</text>

  <!-- Row 6 -->
  <rect x="842" y="209" width="400" height="1" fill="#1D1D1A"/>
  <text x="848" y="227" fill="#6A6A63" font-family="Noto Sans Mono, monospace" font-size="11">JIMÉNEZ M., Sara</text>
  <text x="1214" y="227" fill="#6A6A63" font-family="Noto Sans Mono, monospace" font-size="11">—</text>

  <!-- Row 7 — highlighted -->
  <rect x="842" y="237" width="400" height="1" fill="#1D1D1A"/>
  <rect x="842" y="238" width="400" height="28" rx="2" fill="#C8FF00" fill-opacity="0.05"/>
  <rect x="842" y="238" width="2" height="28" fill="#C8FF00"/>
  <text x="852" y="256" fill="#EEEDE9" font-family="Noto Sans Mono, monospace" font-size="11">DÍAZ C., Pedro</text>
  <text x="1186" y="256" fill="#C8FF00" font-family="Noto Sans Mono, monospace" font-size="11">▲ DIV</text>

  <!-- Bottom fade on right panel -->
  <rect x="820" y="230" width="460" height="90" fill="url(#fade-panel-bottom)"/>
</svg>
