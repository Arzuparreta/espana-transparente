name: Database recovery

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type RECOVER to rebuild self-hosted derived data
        required: true

jobs:
  recover:
    name: Reclaim derived storage and rebuild caches
    if: inputs.confirmation == 'RECOVER'
    runs-on: [self-hosted, linux, x64, espana-transparente]
    timeout-minutes: 90
    concurrency:
      group: production-database-writer
      cancel-in-progress: false
    defaults:
      run:
        working-directory: etl
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-etl
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: Verify database is writable
        run: python -m common.pipeline_monitor preflight --attempts 12 --delay-seconds 10
      - name: Reclaim oversized derived search storage
        run: python apply_migration.py ../supabase/migrations/20260708000000_reduce_search_storage_pressure.sql
      - name: Rebuild bounded search corpus
        run: python -m common.search_refresh --corpus-only
      - name: Rebuild aliases and public caches
        run: |
          python -m common.search_refresh --aliases-only
          python -m common.search_refresh --sections-only
          python -m common.search_refresh --money-only
      - name: Verify production datasets
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
        run: node scripts/search-check.mjs --routes-only
