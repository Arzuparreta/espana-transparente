name: CI

# ── Secrets ──────────────────────────────────────────────────────────────────
# DATABASE_URL              → Postgres direct URI (write access) — KEEP SECRET
# SUPABASE_SERVICE_ROLE_KEY → Supabase service_role (admin writes) — KEEP SECRET
#
# The values below (URL + anon key) are public by design:
#   - SUPABASE_URL is visible in every browser request
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY is the publishable anon key (read-only)
# They are inlined for simplicity; no security risk.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      etl_batch:
        description: ETL batch to run in addition to checks
        required: true
        type: choice
        default: checks-only
        options:
          - checks-only
          - daily
          - weekly
          - all
  schedule:
    - cron: '0 4 * * *'   # etl-daily
    - cron: '0 5 * * 1'   # etl-weekly

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'schedule' && github.event.schedule || github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

jobs:
  web:
    name: Web (Next.js)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://zktpodkvlgciluhbulwr.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_PP5UVS47MgYZfVhzFA5vHg_30G6Cc9O
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run ui:audit
      - run: npm run content:audit
      - run: npm run build

  data-health:
    name: Data health (live Supabase)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://zktpodkvlgciluhbulwr.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_PP5UVS47MgYZfVhzFA5vHg_30G6Cc9O
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/search-check.mjs --routes-only

  etl-check:
    name: ETL (install + tests)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=src python -m pytest tests/
      - run: PYTHONPATH=src python -m src.congreso.gobierno --dry-run
      - run: PYTHONPATH=src python -m src.public_bodies.boe_nombramientos --dry-run --days 1
      - run: PYTHONPATH=src python -m src.ine.ipc_subgrupos --dry-run
      - run: PYTHONPATH=src python -m src.elections.ingest --dry-run

  etl-daily:
    name: ETL daily pipelines
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.etl_batch == 'daily' || inputs.etl_batch == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: etl
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: https://zktpodkvlgciluhbulwr.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: bash scripts/run_scheduled_etls.sh daily

  etl-weekly:
    name: ETL weekly pipelines
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 5 * * 1') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.etl_batch == 'weekly' || inputs.etl_batch == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: etl
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: https://zktpodkvlgciluhbulwr.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: bash scripts/run_scheduled_etls.sh weekly
