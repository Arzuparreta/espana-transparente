name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"  # Daily at 4am UTC
    - cron: "0 5 * * 1"  # Mondays at 5am UTC (slow weekly pipelines)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://zktpodkvlgciluhbulwr.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_PP5UVS47MgYZfVhzFA5vHg_30G6Cc9O
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run ui:audit
      - run: npm run content:audit
      - run: npm run build

  etl-check:
    name: ETL (install + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=src python -m pytest tests/
      - run: PYTHONPATH=src python -m src.congreso.gobierno --dry-run

  etl-daily:
    name: ETL daily pipelines
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=src python -m src.congreso.diputados
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.congreso.asistencia --from-date 20250101
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.ine.indicadores
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.contratacion.contratos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.bdns.subvenciones --from-date $(date -d 'yesterday' +%Y-%m-%d) --to-date $(date +%Y-%m-%d) --importe-min 0 --max-pages 100
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.photos.run --refresh-missing
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: https://zktpodkvlgciluhbulwr.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  etl-weekly:
    name: ETL weekly pipelines
    if: github.event_name == 'schedule' && github.event.schedule == '0 5 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=src python -m src.congreso.cods --resume
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.congreso.declaraciones
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.congreso.gobierno
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.congreso.responsables
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.photos.run --no-refresh-missing --max-age-days 30
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: https://zktpodkvlgciluhbulwr.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: PYTHONPATH=src python -m src.presupuestos.presupuestos --year $(date +%Y) --resume
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.puertas_giratorias.ingest --watchlist data/personas_vigiladas.yml
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.instituciones.instituciones
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.kohesio.fondos_ue
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: PYTHONPATH=src python -m src.senado.senadores
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
