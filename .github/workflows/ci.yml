name: CI

# ── Secrets ──────────────────────────────────────────────────────────────────
# DATABASE_URL              → Postgres direct URI (write access) — KEEP SECRET
# SUPABASE_SERVICE_ROLE_KEY → Supabase service_role (admin writes) — KEEP SECRET
#
# SUPABASE_URL and SUPABASE_ANON_KEY are repository variables. They are public
# by design, but keeping them in one place prevents deploys from drifting.
#   - SUPABASE_URL is visible in every browser request
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY is the publishable anon key (read-only)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      etl_batch:
        description: ETL batch to run in addition to checks
        required: true
        type: choice
        default: checks-only
        options:
          - checks-only
          - daily
          - weekly
          - all
  schedule:
    - cron: '0 4 * * *'   # etl-daily
    - cron: '0 6 * * 1'   # etl-weekly

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'schedule' && github.event.schedule || github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

jobs:
  web:
    name: Web (Next.js)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run ui:audit
      - run: npm run content:audit
      - run: npm run build

  deploy-web:
    name: Deploy web to VPS
    needs: web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: "20m"
          script: |
            set -e
            cd /root/Proyectos/espana-transparente
            # Bootstrap: update the checkout (and the deploy script itself) first.
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy-vps.sh
            # Run the build+restart DETACHED so a dropped SSH session can't kill it
            # (the previous inline pattern died with SIGTERM on transient drops).
            rm -f /tmp/et-deploy.done /tmp/et-deploy.log
            setsid bash -c 'bash scripts/deploy-vps.sh > /tmp/et-deploy.log 2>&1; echo $? > /tmp/et-deploy.done' </dev/null >/dev/null 2>&1 &
            echo "deploy launched (detached); waiting for completion…"
            # Heartbeat poll keeps the SSH session active and reports progress.
            for i in $(seq 1 90); do
              [ -f /tmp/et-deploy.done ] && break
              echo "  …building ($((i * 10))s)"
              sleep 10
            done
            echo "----- deploy log (tail) -----"
            tail -n 40 /tmp/et-deploy.log 2>/dev/null || true
            CODE=$(cat /tmp/et-deploy.done 2>/dev/null || echo TIMEOUT)
            echo "deploy exit code: $CODE"
            [ "$CODE" = "0" ]
      - name: Verify deployment health
        run: |
          curl --fail --show-error --silent \
            --retry 5 --retry-delay 10 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            "https://spaintransparencia.info/api/health"

  data-health:
    name: Data health (live Supabase)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node scripts/search-check.mjs --routes-only

  etl-check:
    name: ETL (install + tests)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=src python -m pytest tests/
      - run: PYTHONPATH=src python -m src.congreso.gobierno --dry-run
      - run: PYTHONPATH=src python -m src.public_bodies.boe_nombramientos --dry-run --days 1
      - run: PYTHONPATH=src python -m src.ine.ipc_subgrupos --dry-run
      - run: PYTHONPATH=src python -m src.elections.ingest --dry-run

  database-migrate:
    name: Apply self-hosted database migrations
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, x64, espana-transparente]
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Apply pending migrations
        run: NPM_CONFIG_CACHE=${RUNNER_TEMP}/npm-cache npx supabase migration up --db-url "$DATABASE_URL" --include-all
      - name: Close abandoned ETL runs
        run: |
          psql "$DATABASE_URL" --set=ON_ERROR_STOP=1 --command="
            UPDATE etl_runs
            SET status = 'failed',
                error_summary = 'Execution ended without reporting completion',
                finished_at = now()
            WHERE status = 'running'
              AND started_at < now() - interval '2 hours';
          "

  etl-daily:
    name: ETL daily pipelines
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.etl_batch == 'daily' || inputs.etl_batch == 'all'))
    runs-on: [self-hosted, linux, x64, espana-transparente]
    timeout-minutes: 180
    defaults:
      run:
        working-directory: etl
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-etl
      - run: bash scripts/run_scheduled_etls.sh daily

  etl-weekly-core:
    name: ETL weekly core
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.etl_batch == 'weekly' || inputs.etl_batch == 'all'))
    runs-on: [self-hosted, linux, x64, espana-transparente]
    timeout-minutes: 180
    defaults:
      run:
        working-directory: etl
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-etl
      - run: bash scripts/run_scheduled_etls.sh weekly-core

  etl-weekly-documents:
    name: ETL weekly documents
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.etl_batch == 'weekly' || inputs.etl_batch == 'all'))
    runs-on: [self-hosted, linux, x64, espana-transparente]
    timeout-minutes: 360
    defaults:
      run:
        working-directory: etl
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-etl
      - run: bash scripts/run_scheduled_etls.sh weekly-documents

  etl-weekly-links:
    name: ETL weekly links and indexes
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.etl_batch == 'weekly' || inputs.etl_batch == 'all'))
    runs-on: [self-hosted, linux, x64, espana-transparente]
    timeout-minutes: 240
    defaults:
      run:
        working-directory: etl
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-etl
      - run: bash scripts/run_scheduled_etls.sh weekly-links
