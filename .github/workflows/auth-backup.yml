name: Auth backup

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  backup:
    name: Encrypted critical export
    runs-on: [self-hosted, linux, x64, espana-transparente]
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.AUTH_BACKUP_ENCRYPTION_PASSPHRASE }}
      AUTH_INSTANCE_NAME: espana-transparente-self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-etl
      - name: Verify backup tools
        run: |
          command -v pg_dump
          command -v pg_restore
          command -v psql
          command -v docker
          command -v openssl
      - name: Create encrypted backup
        env:
          BACKUP_OUTPUT_DIR: ${{ runner.temp }}/auth-backups
        run: bash etl/scripts/backup_auth_data.sh
      - name: Upload encrypted artifact
        uses: actions/upload-artifact@v7
        with:
          name: critical-backup-${{ github.run_id }}
          path: ${{ runner.temp }}/auth-backups/*.tar.gz.enc
          if-no-files-found: error
          retention-days: 30
