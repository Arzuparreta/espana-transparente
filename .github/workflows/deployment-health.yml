name: Deployment health

on:
  deployment_status:

concurrency:
  group: deployment-health-${{ github.event.deployment.sha }}
  cancel-in-progress: true

jobs:
  production:
    name: Production app and database
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify deployed revision health
        env:
          PRODUCTION_URL: https://xn--espaatransparente-ixb.site
        run: |
          # A cold Supabase free-tier project can take 1-3 min to wake on the
          # first request after a deploy. 24×15s ≈ 6 min of retries tolerates
          # that cold start; a longer outage still fails (and that is correct).
          # --max-time caps each attempt so a hung 522 can't eat the budget.
          curl --fail --show-error --silent \
            --retry 24 --retry-delay 15 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            "${PRODUCTION_URL}/api/health"
