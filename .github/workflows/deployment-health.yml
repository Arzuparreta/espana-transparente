name: Deployment health

on:
  deployment_status:

concurrency:
  group: deployment-health-${{ github.event.deployment.sha }}
  cancel-in-progress: true

jobs:
  production:
    name: Production app and database
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify deployed revision health
        env:
          PRODUCTION_URL: https://xn--espaatransparente-ixb.site
        run: |
          # Retry a cold start without repeatedly hammering an unavailable
          # database and tripping the pooler's authentication circuit breaker.
          curl --fail --show-error --silent \
            --retry 5 --retry-delay 20 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            "${PRODUCTION_URL}/api/health"
