name: Auth smoke

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: URL to test
        required: true
        default: https://spaintransparencia.info
      browser:
        description: Run browser persistence check
        required: true
        type: boolean
        default: true

concurrency:
  group: auth-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Temporary signup smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AUTH_SMOKE_APP_URL: ${{ inputs.app_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Install Playwright
        if: ${{ inputs.browser }}
        run: |
          npm install --no-save --no-package-lock playwright@1.52.0
          npx playwright install chromium
      - name: Run API auth smoke
        if: ${{ !inputs.browser }}
        run: node scripts/auth-smoke.mjs
      - name: Run browser auth smoke
        if: ${{ inputs.browser }}
        run: node scripts/auth-smoke.mjs --browser
