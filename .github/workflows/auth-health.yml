name: Auth health

on:
  workflow_dispatch:
  schedule:
    - cron: '15 3 * * *'

concurrency:
  group: auth-health-${{ github.ref }}
  cancel-in-progress: false

jobs:
  health:
    name: Read-only auth checks
    runs-on: [self-hosted, linux, x64, espana-transparente]
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AUTH_EXPECTED_SUPABASE_HOST: ${{ vars.AUTH_EXPECTED_SUPABASE_HOST }}
      AUTH_MIN_USERS: ${{ vars.AUTH_MIN_USERS || '1' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Verify PostgreSQL client
        run: command -v psql
      - name: Run auth health
        run: node web/scripts/auth-health.mjs
