# Altos cargos públicos sin escaño en el Congreso (ministros sin acta,
# presidentes/consejeros autonómicos, alcaldes de grandes ciudades) que
# aparecen como "responsable político" en responsibility_positions con
# politician_id IS NULL.
#
# Datos declarativos: este YAML es la fuente de verdad para `public_officials`.
# Cualquier cambio se hace por PR y se re-ingesta con
# `python -m src.congreso.public_officials`.
#
# Convenciones:
#  - `aliases`: person_name EXACTOS (formato "Apellidos, Nombre" del Congreso/
#    fuentes autonómicas/municipales) tal y como aparecen en
#    responsibility_positions.person_name. Matching exacto normalizado, sin
#    fuzzy (el YAML está curado a mano).
#  - `wikidata_qid`: null si no se ha confirmado una entrada de Wikidata.
#    Sin QID no hay foto (degradación a iniciales en el frontend).
#  - Mantener separado de `politicians` (ámbito Congreso/Senado).
#
# Última verificación: 2026-06-11
# Fuente: responsibility_positions (etl/data/responsibility_positions.yml,
# etl/data/gobierno_historico.yml), Wikidata.

