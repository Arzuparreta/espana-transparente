# Ministros del Gobierno de España, 2016-actual.
#
# Datos declarativos: este YAML es la fuente de verdad para `government_positions`.
# Cualquier cambio se hace por PR y se re-ejecuta `python -m src.congreso.gobierno`.
#
# Convenciones:
#  - `organization`: SIEMPRE en MAYÚSCULAS sin tildes (clave de join contra
#    subsidies.ministry_normalized / contracts.ministry_normalized).
#  - `aliases`: variantes del nombre tal y como aparecen en BDNS/PCSP.
#  - `person`: "Apellidos, Nombre" (formato Congreso). Si está en activo como
#    diputado/a, el ETL lo emparejará con `politicians`. Si no, queda como nombre.
#  - Fechas en formato ISO. `end` null = en activo.
#  - `source`: URL del Real Decreto en el BOE.
#
# Última verificación: 2026-05-14
# Fuente: BOE (RD nombramiento), La Moncloa, Wikipedia.

