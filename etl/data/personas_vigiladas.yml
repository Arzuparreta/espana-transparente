# Personas a vigilar en BORME para detección automática de puertas giratorias.
#
# BORME registra nombramientos, ceses y poderes notariales de sociedades.
# El pipeline semanal busca estas personas en el sumario del día y genera
# candidatos con confidence=0.35 para revisión humana.
#
# Campos:
#   name    — nombre completo tal y como aparece en fuentes oficiales (BORME usa
#             mayúsculas; el buscador es case-insensitive)
#   role    — último cargo público conocido (solo informativo — no va a BD)
#   party   — partido o gobierno de referencia
#   sector  — sector privado más probable (orienta la revisión humana)

